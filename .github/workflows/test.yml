name:                            OpenEMR Build
on:                              [push, pull_request]
env:
  CI:                            true
#efore_install:
#  - echo "extension=ldap.so" >>php --ini | grep "Loaded Configuration" | sed -e "s|.:\s||"``
#before_script:
#  - echo 'error_reporting = "E_ALL & ~E_NOTICE & ~E_STRICT"' >> ~/.phpenv/versions/$(phpenv version-name)/etc/conf.d/travis.ini
jobs:
  psr12:
    name:                        Psr12 Style
    runs-on:                     ubuntu-latest
    steps:
        - name: Clone repository
          uses: actions/checkout@v2
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '7.4'
        - name:                  Start sJob
          run:                   failJob=false
        - name:                  lint_style
          run:                   composer global require "squizlabs/php_codesniffer=3.*" && /home/runner/.composer/vendor/bin/phpcs -p -n --extensions=php,inc --report-width=120 --standard=$GITHUB_WORKSPACE/ci/phpcs.xml --report=full $GITHUB_WORKSPACE
        - name:                  job_summary_prep
          run:                   ./job_summary_prep.sh
  themestyle:
    name:                        Theme Style
    runs-on:                     ubuntu-latest
    steps:
        - name: Clone repository
          uses: actions/checkout@v2
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '7.4'
        - name:                  Start Job
          run:                   failJob=false
        - name:                  lint_theme_style
          run:                   ./lint_theme_style.sh
        - name:                  job_summary_prep
          run:                   ./job_summary_prep.sh
  syntax:
    name:                        Syntax - PHP {{ matrix.php-versions }}
    runs-on:                     ubuntu-latest
    strategy:
      matrix:
        php-versions: ['7.2', '7.3', '7.4']
    steps:
        - name: Clone repository
          uses: actions/checkout@v2
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '7.4'
        - name:              Start Job
          run:               failJob=false
        - name:              lint_syntax
          run:               ./lint_syntax.sh
        - name:              job_summary_prep
          run:               ./job_summary_prep.sh
  syntax-80:
    name:                        Syntax - PHP 8.0
    continue-on-error:           true
    runs-on:                     ubuntu-latest
    steps:
        - name: Clone repository
          uses: actions/checkout@v2
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '8.0'
        - name:                  Start Job
          run:                   failJob=false
        - name:                  lint_syntax
          run:                   ./lint_syntax.sh
        - name:                  job_summary_prep
          run:                   ./job_summary_prep.sh
  buildtest-apache-mariadb:
    name:                        Build and test - PHP 7.3 - Apache - MariaDB 10.5
    runs-on:                     ubuntu-latest
    continue-on-error:           true
    steps:
        - name: Clone repository
          uses: actions/checkout@v2
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '7.3'
        - name:              Start Job
          run:               failJob=false
        - name:              dockers_env_start
          run:               ./dockers_env_start.sh
          env:
              DOCKER_DIR: apache_73_105
              OPENEMR_DIR: /var/www/localhost/htdocs/openemr
              CHROMIUM_INSTALL: "apk update; apk add --no-cache chromium chromium-chromedriver; export PANTHER_CHROME_DRIVER_BINARY=/usr/lib/chromium/chromedriver"
        - name:              main_build
          run:               ./main_build.sh
        - name:              ccda_build
          run:               ./ccda_build.sh
        - name:              install_configure
          run:               ./install_configure.sh
        - name:              build_test_unit
          run:               ./build_test_unit.sh
        - name:              build_test_e2e
          run:               ./build_test_e2e.sh
        - name:              build_test_api
          run:               ./build_test_api.sh
        - name:              build_test_fixtures
          run:               ./build_test_fixtures.sh
        - name:              build_test_services
          run:               ./build_test_services.sh
        - name:              build_test_validators
          run:               ./build_test_validators.sh
        - name:              build_test_controllers
          run:               ./build_test_controllers.sh
        - name:              job_summary_prep
          run:               ./job_summary_prep.sh
