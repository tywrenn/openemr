      echo "Run Validator Tests"
      echo "-------------"
      docker exec -i $(docker ps | grep _openemr | cut -f 1 -d " ") sh -c "cd ${OPENEMR_DIR}; php ${OPENEMR_DIR}/vendor/bin/phpunit --testsuite validators --testdox" || failTest=true
      if $failTest; then
        failJob=true
        mes="FAILED"
      else
        mes="PASSED"
      fi
      echo "----------------------"
      jobTest="${mes} - Run Validator Tests"
      jobTests+="${jobTest}\n"
      echo "${jobTest}"
      echo "----------------------"
  - &build_test_controllers |
      failTest=false
      echo "-------------"
      echo "Run Controller Tests"
      echo "-------------"
      docker exec -i $(docker ps | grep _openemr | cut -f 1 -d " ") sh -c "cd ${OPENEMR_DIR}; php ${OPENEMR_DIR}/vendor/bin/phpunit --testsuite controllers --testdox" || failTest=true
      if $failTest; then
        failJob=true
        mes="FAILED"
      else
        mes="PASSED"
      fi
      echo "----------------------"
      jobTest="${mes} - Run Controller Tests"
      jobTests+="${jobTest}\n"
      echo "${jobTest}"
      echo "----------------------"
  - &job_summary_prep |
      if $failJob; then
        mes="FAILED"
      else
        mes="PASSED"
      fi
      jobSummary="--------------------------------------------\n"
      jobSummary+="--------------------------------------------\n"
      jobSummary+="${mes} - JOB SUMMARY\n"
      jobSummary+="--------------------------------------------\n"
      jobSummary+="${jobTests}"
      jobSummary+="--------------------------------------------"
before_install:
  - echo "extension=ldap.so" >>php --ini | grep "Loaded Configuration" | sed -e "s|.:\s||"``
before_script:
  - echo 'error_reporting = "E_ALL & ~E_NOTICE & ~E_STRICT"' >> ~/.phpenv/versions/$(phpenv version-name)/etc/conf.d/travis.ini
jobs:
  build:
    - name: Psr12 style
      php: '7.4'
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
      steps:
        - name: Start Job
          run: failJob=false
        - name: lint_style
          run: |
            composer global require "squizlabs/php_codesniffer=3.*"
            $HOME/.config/composer/vendor/bin/phpcs -p -n --extensions=php,inc --report-width=120 --standard=ci/phpcs.xml --report=full .
        - *job_summary_prep
        - echo -e "${jobSummary}"
        - if $failJob; then exit 1; fi
    - name: Theme style
      php: '7.4'
      steps:
        - name: Start Job
          run: failJob=false
        - name: lint_theme_style
          run: |
            npm install
            npx stylelint "**/*.css"
            npx stylelint "**/*.scss"
        - *job_summary_prep
        - echo -e "${jobSummary}"
        - if $failJob; then exit 1; fi
    - name: Syntax - PHP 7.2
      php: '7.2'
      steps:
        - name: Start Job
          run: failJob=false
        - name: lint_syntax
          run: |
            failTest=false
            echo "------------------------------"
            echo "Checking for PHP syntax errors"
            echo "------------------------------"
            failSyntax=false
            if find . -type f -name "*.php" -exec php -d error_reporting=32767 -l {} \; 2>&1 >&- | grep "^"; then failSyntax=true; fi
            if find . -type f -name "*.inc" -exec php -d error_reporting=32767 -l {} \; 2>&1 >&- | grep "^"; then failSyntax=true; fi
            if $failSyntax; then
            failTest=true
            fi
            if $failTest; then
            failJob=true
            mes="FAILED"
            else
            mes="PASSED"
            fi
            echo "---------------------------------------"
            jobTest="${mes} - Checking for PHP syntax errors"
            jobTests+="${jobTest}\n"
            echo "${jobTest}"
            echo "---------------------------------------"
        - *job_summary_prep
        - echo -e "${jobSummary}"
        - if $failJob; then exit 1; fi
