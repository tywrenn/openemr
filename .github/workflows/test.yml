name:                         OpenEMR Build
on:                           [push, pull_request]
env:
  CI:                         true
#efore_install:
#  - echo "extension=ldap.so" >>php --ini | grep "Loaded Configuration" | sed -e "s|.:\s||"``
#before_script:
#  - echo 'error_reporting = "E_ALL & ~E_NOTICE & ~E_STRICT"' >> ~/.phpenv/versions/$(phpenv version-name)/etc/conf.d/travis.ini
jobs:
  run:
    name:                     Node ${{ matrix.node }}
    runs-on:                  ubuntu-latest

    strategy:
      fail-fast:              false
      matrix:
        node:                 [10, 12]
    steps:
        - name:               Psr12 style
          uses:               shivammathur/setup-php@v2
          with:
            php-version:      '7.4'
            repo-token:       ${{ secrets.GITHUB_TOKEN }}
          steps:
            - name:           Start sJob
              run:            failJob=false
            - name:           lint_style
              run:            |
                composer global require "squizlabs/php_codesniffer=3.*"
                $HOME/.config/composer/vendor/bin/phpcs -p -n --extensions=php,inc --report-width=120 --standard=ci/phpcs.xml --report=full .
            - name:           job_summary_prep
              run:            |
                if $failJob; then
                mes="FAILED"
                else
                mes="PASSED"
                fi
                jobSummary="--------------------------------------------\n"
                jobSummary+="--------------------------------------------\n"
                jobSummary+="${mes} - JOB SUMMARY\n"
                jobSummary+="--------------------------------------------\n"
                jobSummary+="${jobTests}"
                jobSummary+="--------------------------------------------"
                echo -e "${jobSummary}"
                if $failJob; then exit 1; fi
        - name:               Theme style
          uses:               shivammathur/setup-php@v2
          with:
            php-version:      '7.4'
          steps:
            - name:           Start Job
              run:            failJob=false
            - name:           lint_theme_style
              run:            |
                npm install
                npx stylelint "**/*.css"
                npx stylelint "**/*.scss"
            - name:           job_summary_prep
              run:            |
                if $failJob; then
                mes="FAILED"
                else
                mes="PASSED"
                fi
                jobSummary="--------------------------------------------\n"
                jobSummary+="--------------------------------------------\n"
                jobSummary+="${mes} - JOB SUMMARY\n"
                jobSummary+="--------------------------------------------\n"
                jobSummary+="${jobTests}"
                jobSummary+="--------------------------------------------"
                echo -e "${jobSummary}"
                if $failJob; then exit 1; fi
        - name:               Syntax - PHP 7.2
          uses:               shivammathur/setup-php@v2
          with:
            php-version:      '7.2'
          steps:
            - name:           Start Job
              run:            failJob=false
            - name:           lint_syntax
              run:            |
                failTest=false
                echo "------------------------------"
                echo "Checking for PHP syntax errors"
                echo "------------------------------"
                failSyntax=false
                if find . -type f -name "*.php" -exec php -d error_reporting=32767 -l {} \; 2>&1 >&- | grep "^"; then failSyntax=true; fi
                if find . -type f -name "*.inc" -exec php -d error_reporting=32767 -l {} \; 2>&1 >&- | grep "^"; then failSyntax=true; fi
                if $failSyntax; then
                failTest=true
                fi
                if $failTest; then
                failJob=true
                mes="FAILED"
                else
                mes="PASSED"
                fi
                echo "---------------------------------------"
                jobTest="${mes} - Checking for PHP syntax errors"
                jobTests+="${jobTest}\n"
